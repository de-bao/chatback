name = "chat-api-router"
main = "worker.js"
compatibility_date = "2024-01-01"

# 路由配置（在 Cloudflare Dashboard 中配置自定义域名，或使用以下配置）
# routes = [
#   { pattern = "debaosite.dpdns.org/*", zone_name = "dpdns.org" }
# ]

# 环境变量（在 Cloudflare Dashboard 的 Variables 中配置，不要写在这里）
# 在 Dashboard → Workers & Pages → chat-api-router → Settings → Variables 中添加：
# - BACKEND_URL = https://chatback--debaocpc.replit.app
# - FRONTEND_URL = https://your-username.github.io（你的 GitHub Pages 地址）
